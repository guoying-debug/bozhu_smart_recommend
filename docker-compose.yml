name: ${COMPOSE_PROJECT_NAME:-guoying_bilibili}

services:
  init:
    build: .
    restart: "no"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root_password}
      DB_NAME: ${DB_NAME:-bilibili_data}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      LLM_MODEL: ${LLM_MODEL:-glm-4-flash-250414}
      AUTO_LOAD_DATA: ${AUTO_LOAD_DATA:-true}
      AUTO_TRAIN_MODEL: ${AUTO_TRAIN_MODEL:-true}
      AUTO_BUILD_CHROMA: ${AUTO_BUILD_CHROMA:-true}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-180}
      ENABLE_SCHEDULER: "false"
    command: ["python", "scripts/docker_prepare.py"]
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./chroma_db:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bilibili_net

  web:
    build: .
    restart: always
    ports:
      - "${WEB_EXPOSED_PORT:-5000}:5000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root_password}
      DB_NAME: ${DB_NAME:-bilibili_data}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      LLM_MODEL: ${LLM_MODEL:-glm-4-flash-250414}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
    command: ["gunicorn", "-w", "1", "-b", "0.0.0.0:5000", "app:create_app()"]
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./chroma_db:/app/chroma_db
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/metrics', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bilibili_net

  agent:
    build: .
    restart: always
    ports:
      - "${AGENT_EXPOSED_PORT:-8501}:8501"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root_password}
      DB_NAME: ${DB_NAME:-bilibili_data}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      LLM_MODEL: ${LLM_MODEL:-glm-4-flash-250414}
      ENABLE_SCHEDULER: "false"
    command: ["streamlit", "run", "web_agent.py", "--server.port=8501", "--server.address=0.0.0.0"]
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./chroma_db:/app/chroma_db
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - bilibili_net

  db:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/mysql:8.0
    restart: always
    ports:
      - "${DB_EXPOSED_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-bilibili_data}
    volumes:
      - ./db_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bilibili_net
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/prom/prometheus:latest
    restart: always
    ports:
      - "${PROMETHEUS_EXPOSED_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - bilibili_net

  grafana:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/grafana/grafana:latest
    restart: always
    ports:
      - "${GRAFANA_EXPOSED_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - bilibili_net

networks:
  bilibili_net:
    driver: bridge
